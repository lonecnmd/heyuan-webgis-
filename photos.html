<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>民宿照片查看</title>
  <style>
    html, body {
      margin:0; height:100%; overflow:hidden;
      background:#071427;
      font-family:"Microsoft YaHei",sans-serif;
    }

    .topbar {
      position:fixed; left:12px; top:12px; right:12px;
      display:flex; gap:10px; align-items:center; z-index:10;
      pointer-events:none;
    }
    .btn {
      pointer-events:auto;
      padding:10px 18px; border-radius:10px;
      border:1px solid rgba(0,180,255,0.35);
      background:rgba(0,40,80,0.65); color:#dff6ff;
      cursor:pointer; font-size:14px;
      backdrop-filter: blur(8px);
      transition: background 0.3s;
    }
    .btn:hover { background:rgba(0,80,140,0.75); }
    .title {
      margin-left:auto; color:rgba(220,240,255,0.85); font-size:18px;
      text-shadow:0 0 12px rgba(0,180,255,0.25);
      pointer-events:none;
    }

    .photo-container {
      position:absolute; inset:0;
      display:flex; justify-content:center; align-items:center;
      padding:70px 20px 20px 20px;
    }
    .photo-container img {
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      border-radius:12px;
      border:2px solid rgba(0,180,255,0.25);
      box-shadow:0 0 40px rgba(0,120,200,0.15);
      background:#0a1e35;
    }

    #loadingOverlay {
      position:fixed; inset:0; z-index:100;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      background:rgba(7,20,39,0.92);
      color:#dff6ff; font-size:18px;
    }
    #loadingOverlay .spinner {
      width:50px; height:50px;
      border:4px solid rgba(0,180,255,0.2);
      border-top:4px solid #00b4ff; border-radius:50%;
      animation: spin 1s linear infinite; margin-bottom:20px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>

<body>
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div>正在加载照片...</div>
  </div>

  <div class="topbar">
    <button class="btn" id="btnBack">← 返回上一页</button>
    <div class="title" id="title"></div>
  </div>

  <div class="photo-container">
    <img id="photoImg" alt="民宿照片" />
  </div>

  <script>
    var name = localStorage.getItem('minsu_name') || '民宿';
    var photoUrl = localStorage.getItem('minsu_photo');

    document.getElementById('title').textContent = name + ' - 效果图';
    document.getElementById('btnBack').onclick = function(){ history.back(); };

    console.log('照片名称:', name);
    console.log('照片路径:', photoUrl);

    if (!photoUrl) {
      document.getElementById('loadingOverlay').innerHTML =
        '<div style="color:#ff6666;font-size:20px;">❌ 缺少照片路径</div>' +
        '<button onclick="history.back()" style="margin-top:20px;padding:10px 20px;cursor:pointer;">返回</button>';
    } else {
      var img = document.getElementById('photoImg');

      img.onload = function() {
        console.log('✅ 照片加载成功');
        document.getElementById('loadingOverlay').style.display = 'none';
      };

      img.onerror = function() {
        console.error('❌ 照片加载失败');
        document.getElementById('loadingOverlay').innerHTML =
          '<div style="color:#ff6666;font-size:18px;">❌ 照片加载失败</div>' +
          '<div style="color:#ffaa66;font-size:14px;margin-top:10px;">路径: ' + photoUrl + '</div>' +
          '<button onclick="history.back()" style="margin-top:20px;padding:10px 20px;cursor:pointer;border-radius:8px;border:1px solid #00b4ff;background:#0a2a4a;color:#dff6ff;">返回</button>';
      };

      img.src = photoUrl;
    }
  </script>
</body>
</html>
